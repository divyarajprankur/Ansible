---
- name: Play To Install Packages On Different OS Families
  hosts: all
  gather_facts: true
  become: yes
  tasks: 
    - name: Installing Packages on REHL Families
      ansible.builtin.yum:
        name:
          - nginx
          - vim
          - wget
        state: present
        update_cache: true
      when: ansible_facts.os_family == "RedHat"
    - name: Installing Packages on Debian Families  
      ansible.builtin.apt:
        name:
          - nginx
          - vim
          - wget
        state: present
        update_cache: true
      when: ansible_facts.os_family == "Debian"

