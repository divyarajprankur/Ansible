---
- name: Play to install a given pkg based on pkg_mgr
  hosts: dev
  gather_facts: true
  become: yes
  tasks:
    - name: Installing Pkgs using yum
      ansible.builtin.yum:
        name: "{{reqpkg.yum}}"
        state: present
        update_cache: yes
      when: ansible_facts.pkg_mgr == "yum"
    - name: Installing Pkgs using dnf
      ansible.builtin.dnf:
        name: "{{reqpkg.dnf}}"
        state: present
        update_cache: yes
      when: ansible_facts.pkg_mgr == "dnf"
    - name: Installing Pkgs using apt
      ansible.builtin.apt:
        name: "{{reqpkg.apt}}"
        state: present
        update_cache: yes
      when: ansible_facts.pkg_mgr == "apt"            
... 
## Run the playbook
## ansible-playbook play36_DICt_installPkgsUsingNodesPKGManagerType.yml -e '{ reqpkg: { "yum": "httpd" , "dnf": "httpd" , "apt":"apache2"}}'
